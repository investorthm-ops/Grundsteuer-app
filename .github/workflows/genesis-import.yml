name: GENESIS Import (wöchentlich)

on:
  schedule:
    # Jeden Montag um 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Nur Trockentest (keine DB-Schreibvorgänge)'
        type: boolean
        default: false

env:
  GENESIS_USERNAME: ${{ secrets.GENESIS_USERNAME }}
  GENESIS_PASSWORD: ${{ secrets.GENESIS_PASSWORD }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install httpx
        name: Install dependencies

      - name: Datenimport NRW + Hessen
        run: |
          FLAGS=""
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            FLAGS="--dry-run"
          fi
          python scripts/genesis_import.py $FLAGS
