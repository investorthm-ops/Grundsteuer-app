name: Supabase Keep-alive

# Hält das Supabase-Free-Projekt aktiv. Ohne regelmäßige DB-Aktivität pausiert
# der Free-Plan nach ~1 Woche automatisch und die Live-App ist ohne Daten.
# Der Ping ruft den Health-Endpunkt der Produktions-App auf, der eine minimale
# DB-Leseabfrage ausführt.

on:
  schedule:
    # Alle 3 Tage um 06:30 UTC — deutlich innerhalb des ~7-Tage-Pause-Fensters,
    # mit Reserve falls ein Lauf fehlschlägt.
    - cron: '30 6 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    name: Health-Ping
    runs-on: ubuntu-latest
    steps:
      - name: Produktions-Health-Endpunkt aufrufen
        run: |
          # Hinweis: Nach dem Domain-Umzug (grundsteuermonitor.de) hier die URL anpassen.
          URL="https://grundsteuer-app.vercel.app/api/health"
          attempts=5

          for attempt in $(seq 1 "$attempts"); do
            if code=$(curl -sS --connect-timeout 10 --max-time 30 -o response.txt -w "%{http_code}" "$URL"); then
              if [ "$code" = "200" ] && jq -e '.ok == true and .db == "up"' response.txt > /dev/null; then
                echo "Keep-alive erfolgreich (Versuch $attempt/$attempts)."
                cat response.txt
                exit 0
              fi
            else
              code="000"
            fi

            echo "::warning::Keep-alive-Versuch $attempt/$attempts fehlgeschlagen (HTTP $code)."
            head -c 500 response.txt 2>/dev/null || true
            echo

            if [ "$attempt" -lt "$attempts" ]; then
              sleep 20
            fi
          done

          echo "::error::Keep-alive-Health-Check nach $attempts Versuchen fehlgeschlagen."
          exit 1
